name: README Guard

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-readme-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail when docs-sensitive changes skip README
        shell: bash
        run: |
          set -euo pipefail

          BASE_REF="${{ github.base_ref }}"
          if [[ -z "$BASE_REF" ]]; then
            echo "No base ref detected (non-PR run). Skipping README guard."
            exit 0
          fi

          git fetch origin "$BASE_REF" --depth=1
          CHANGED_FILES=$(git diff --name-only "origin/$BASE_REF"...HEAD)

          if [[ -z "$CHANGED_FILES" ]]; then
            echo "No changed files detected."
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Files that usually require README review when changed.
          if echo "$CHANGED_FILES" | grep -E '^(src/|public/|package\.json$|vue\.config\.js$|babel\.config\.js$|deploy\.sh$)' > /dev/null; then
            if echo "$CHANGED_FILES" | grep -E '^README\.md$' > /dev/null; then
              echo "README updated in this PR. Guard passed."
            else
              echo "README guard failed: docs-sensitive files changed, but README.md was not updated."
              echo "If README changes are unnecessary, include an explanation in the PR description and add a minimal README note or intentionally update this guard." 
              exit 1
            fi
          else
            echo "No docs-sensitive files changed. Guard passed."
          fi
